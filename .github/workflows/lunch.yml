name: Pangyo Lunch Bot

on:
  schedule:
    # KST 10:00 (UTC 01:00) - Mon to Fri
    - cron: '0 1 * * 1-5'
    # KST 10:40 (UTC 01:40) - Mon to Fri
    - cron: '40 1 * * 1-5'
  workflow_dispatch:
    inputs:
      custom_time:
        description: 'Execution time option (--time 10:00 or 10:40)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - '10:00'
          - '10:40'

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Determine execution arguments
        id: args
        run: |
          TIME_ARG=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "40 1 * * 1-5" ]; then
              TIME_ARG="--time 10:40"
            else
              TIME_ARG="--time 10:00"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.custom_time }}" ]; then
            TIME_ARG="--time ${{ github.event.inputs.custom_time }}"
          fi
          echo "time_arg=$TIME_ARG" >> $GITHUB_OUTPUT

      - name: Run lunch bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
        run: |
          python main.py ${{ steps.args.outputs.time_arg }}

      - name: Commit and push seen.json changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen.json
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen.json history [skip ci]"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes in seen.json to commit."
          fi
