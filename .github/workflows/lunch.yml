name: Pangyo Lunch Bot

on:
  schedule:
    # KST 10:00~10:25 (UTC 01:00~01:25) — 평일 5분 간격
    - cron: '0,5,10,15,20,25 1 * * 1-5'
    # KST 10:30 (UTC 01:30) — 마지막 실행 (미등록 체크)
    - cron: '30 1 * * 1-5'
  workflow_dispatch:
    inputs:
      last_run:
        description: '마지막 실행으로 표시 (미등록 체크 포함)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Determine execution arguments
        id: args
        run: |
          LAST_RUN_ARG=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "30 1 * * 1-5" ]; then
              LAST_RUN_ARG="--last-run"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.last_run }}" = "true" ]; then
            LAST_RUN_ARG="--last-run"
          fi
          echo "last_run_arg=$LAST_RUN_ARG" >> $GITHUB_OUTPUT

      - name: Run lunch bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py ${{ steps.args.outputs.last_run_arg }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen.json docs/
          git add menus.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update lunch data [skip ci]"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes to commit."
          fi
